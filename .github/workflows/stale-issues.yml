name: Close Stale Issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale issues
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 0
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: stale
          stale-issue-message: "This issue has been automatically marked as stale after 60 days without activity and is now being closed. If this is still relevant, please add a comment and we can reopen or revisit it."
